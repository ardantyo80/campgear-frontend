<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampGear - Rental Alat Camping</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Midtrans Snap Script dengan Client Key -->
    <script type="text/javascript" 
      src="https://app.sandbox.midtrans.com/snap/snap.js" 
      data-client-key="SB-Mid-client-xxxxx">
    </script>
    
    <!-- Fallback untuk memastikan window.snap tersedia -->
    <script>
      window.addEventListener('load', function() {
        if (typeof window.snap === 'undefined') {
          console.warn('Midtrans Snap not loaded, reloading...');
          var script = document.createElement('script');
          script.src = 'https://app.sandbox.midtrans.com/snap/snap.js';
          script.setAttribute('data-client-key', 'SB-Mid-client-M4ltUuBibMIjLfvY');
          document.body.appendChild(script);
        }
      });
    </script>
  </body>
</html>
